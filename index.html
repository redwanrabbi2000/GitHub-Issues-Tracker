<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GITHUB Issues Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 font-sans">

    <section id="login-page" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border border-gray-100">
            <div class="text-center mb-8">
                <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" class="w-16 mx-auto mb-4" alt="Logo">
                <h1 class="text-2xl font-bold text-gray-800">GitHub Issues Tracker</h1>
                <p class="text-gray-500 text-sm">Sign in to manage your issues</p>
            </div>
            
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Username</label>
                    <input type="text" id="username" placeholder="Enter Username" class="w-full p-3 border rounded-lg mt-1 focus:ring-2 focus:ring-indigo-500 outline-none">
                    <span class="text-xs text-indigo-600">Default: admin</span>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Password</label>
                    <input type="password" id="password" placeholder="Enter Password" class="w-full p-3 border rounded-lg mt-1 focus:ring-2 focus:ring-indigo-500 outline-none">
                    <span class="text-xs text-indigo-600">Default: admin123</span>
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition">Sign In</button>
            </form>
            
            <div class="mt-8 pt-6 border-t text-center">
                <p class="text-xs text-gray-400 uppercase tracking-widest mb-4">OR</p>
                <div class="bg-gray-50 p-4 rounded-lg">
                    <p class="text-sm text-gray-500">Demo Credentials:</p>
                    <p class="text-sm"><strong>Username:</strong> admin</p>
                    <p class="text-sm"><strong>Password:</strong> admin123</p>
                </div>
            </div>
        </div>
    </section>

    <section id="main-page" class="hidden">
        <nav class="bg-white border-b px-6 py-4 flex flex-wrap justify-between items-center sticky top-0 z-10">
            <div class="flex items-center gap-2">
                <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" class="w-8" alt="">
                <span class="font-bold text-xl text-slate-800">GitHub Issues Tracker</span>
            </div>
            <div class="flex gap-2 w-full md:w-auto mt-4 md:mt-0">
                <div class="relative flex-grow">
                    <input type="text" id="search-input" placeholder="Search issues..." class="border rounded-lg pl-10 pr-4 py-2 w-full focus:ring-2 focus:ring-indigo-500 outline-none">
                    <span class="absolute left-3 top-2.5 text-gray-400"><i class="fa-solid fa-magnifying-glass"></i></span>
                </div>
                <button class="bg-indigo-600 text-white px-4 py-2 rounded-lg font-medium">+ New Issue</button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-6">
            <div class="bg-white rounded-xl shadow-sm border mb-6 overflow-hidden">
                <div class="flex border-b bg-gray-50/50">
                    <button onclick="filterIssues('all')" id="btn-all" class="px-8 py-4 font-medium transition border-b-2 border-indigo-600 bg-indigo-600 text-white">All</button>
                    <button onclick="filterIssues('open')" id="btn-open" class="px-8 py-4 font-medium text-gray-600 hover:bg-gray-100 transition border-b-2 border-transparent">Open</button>
                    <button onclick="filterIssues('closed')" id="btn-closed" class="px-8 py-4 font-medium text-gray-600 hover:bg-gray-100 transition border-b-2 border-transparent">Closed</button>
                </div>
                <div class="p-6 flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <div class="bg-indigo-100 p-3 rounded-full text-indigo-600"><img src="/assets/Aperture.png" alt=""></div>
                        <div>
                            <h2 class="text-2xl font-bold text-gray-800" id="issue-count">0 Issues</h2>
                            <p class="text-gray-500 text-sm">Track and manage your project issues</p>
                        </div>
                    </div>
                    <div class="flex gap-4 text-sm font-medium">
                        <span class="flex items-center gap-2"><span class="w-3 h-3 bg-green-500 rounded-full"></span> Open</span>
                        <span class="flex items-center gap-2"><span class="w-3 h-3 bg-purple-500 rounded-full"></span> Closed</span>
                    </div>
                </div>
            </div>

            <div id="loading" class="text-center py-20 text-indigo-600 font-bold hidden">
                <div class="animate-spin inline-block w-8 h-8 border-4 border-current border-t-transparent rounded-full mb-2"></div>
                <p>Loading Issues...</p>
            </div>
            <div id="issues-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                </div>
        </main>
    </section>

    <div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-xl max-w-2xl w-full p-8 relative shadow-2xl">
            <div id="modal-content"></div>
            <div class="mt-6 flex justify-end">
                <button onclick="closeModal()" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold">Close</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
  
</body>
</html>
